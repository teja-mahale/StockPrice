
name: Fetch Equity Futures Data via cURL

on:
  #repository_dispatch:
  workflow_dispatch:  # Allows manual trigger

jobs:
  fetch-futures-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install kiteconnect pandas

     

      - name: Upload CSV Artifact
        uses: actions/upload-artifact@v4
        with:
         name: spot-futures-data
         path: kfintech_term_structure_full_6months.csv

      - name: Compare RVNL Spot vs MAR26 Future
        id: future
        env:
          KITE_API_KEY: ${{ secrets.API_KEY }}
          KITE_ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          # Define instruments
          SPOT="NSE:RVNL"
          MAR_FUT="NFO:RVNL26MARFUT"
      
          ERROR_MESSAGE=""
      
          # Construct API query
          API_URL="https://api.kite.trade/quote/ltp?i=${SPOT}&i=${MAR_FUT}"
      
          # Make API request
          RESPONSE=$(curl -s -X GET "$API_URL" \
            -H "X-Kite-Version: 3" \
            -H "Authorization: token $KITE_API_KEY:$KITE_ACCESS_TOKEN")
      
          echo "Response: $RESPONSE"
      
          # Extract prices using jq
          SPOT_PRICE=$(echo "$RESPONSE" | jq --arg sym "$SPOT" -r '.data[$sym].last_price')
          MAR_PRICE=$(echo "$RESPONSE" | jq --arg sym "$MAR_FUT" -r '.data[$sym].last_price')
      
          echo "Spot Price: $SPOT_PRICE"
          echo "MAR26 Fut Price: $MAR_PRICE"
      
          # Validate prices
          if [[ "$SPOT_PRICE" == "null" || "$MAR_PRICE" == "null" ]]; then
            echo "Failed to fetch prices"
            exit 1
          fi
      
          # Calculate spread (Future - Spot)
          DIFFERENCE=$(echo "$SPOT_PRICE - $MAR_PRICE" | bc -l)
      
          echo "Spread (MAR - Spot): $DIFFERENCE"
      
          # Threshold checks
          if (( $(echo "$DIFFERENCE <= 25" | bc -l) )); then
            ERROR_MESSAGE+="Alert: RVNL MAR-Spot spread is less than or equal to 26. Current Spread: $DIFFERENCE\n"
          fi
      
          if (( $(echo "$DIFFERENCE >= 30" | bc -l) )); then
            ERROR_MESSAGE+="Alert: RVNL MAR-Spot spread is greater than or equal to 29. Current Spread: $DIFFERENCE\n"
          fi
      
          # Export error message
          echo "ERROR_MESSAGE<<EOF" >> $GITHUB_ENV
          echo -e "$ERROR_MESSAGE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      
          # Fail workflow if threshold breached
          if [[ -n "$ERROR_MESSAGE" ]]; then
            echo -e "$ERROR_MESSAGE"
            exit 1
          fi

      
      - name: Dispatch Slack notification
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "text": "🚨 RVNL Futures Spread Alert",
              "attachments": [
                {
                  "color": "danger",
                  "title": "Spread Threshold Breached",
                  "fields": [
                    {
                      "title": "Alert Message",
                      "value": "${{ env.ERROR_MESSAGE }}",
                      "short": false
                    },
                    {
                      "title": "Workflow Run",
                      "value": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "short": false
                    }
                  ]
                }
              ]
            }
